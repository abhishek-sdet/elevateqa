<section id="sec-email" style="display:none;" aria-labelledby="sec-email-heading">
  <div class="card fade-in">
    <div class="card-header">
      <h2 id="sec-email-heading"><span aria-hidden="true">✉️</span> Blast Out Event Updates</h2>
      <p>Send emails directly from <strong>elevateqa@sdettech.com</strong> to registered attendees or custom lists.</p>
    </div>
    
    <div class="card-body">
      <div class="form-group" style="margin-bottom: 24px;">
        <label for="email-subject">Email Subject</label>
        <input type="text" id="email-subject" placeholder="e.g. Elevate QA 2026: Important Update">
      </div>

      <div class="form-group" style="margin-bottom: 24px;">
        <label for="email-message">Message (HTML supported)</label>
        <textarea id="email-message" rows="6" placeholder="Type your email content here. You can use simple HTML tags like <b>, <i>, <br>, <p>, and <a>." style="font-family: inherit;"></textarea>
      </div>

      <div class="form-group" style="margin-bottom: 24px; border-top: 1px dashed var(--line-light); padding-top: 24px;">
        <label>Recipient Target</label>
        <div style="display: flex; gap: 20px; align-items: center; margin-top: 10px;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-main);">
            <input type="radio" name="email-target" value="all" checked onchange="toggleCustomEmailInput()"> All Registered Attendees
          </label>
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-main);">
            <input type="radio" name="email-target" value="custom" onchange="toggleCustomEmailInput()"> Custom Email(s)
          </label>
        </div>
      </div>

      <div id="custom-emails-container" class="form-group" style="display: none; margin-bottom: 24px;">
        <label for="custom-emails-input">Custom Emails (Comma separated)</label>
        <textarea id="custom-emails-input" rows="3" placeholder="john@example.com, sarah@sdettech.com"></textarea>
      </div>

      <div class="action-row" style="margin-top: 30px;">
        <button id="btn-send-email" class="btn-primary" onclick="sendCustomEmail()" style="width: 100%;">
          SEND EMAIL BLAST <span aria-hidden="true">🚀</span>
        </button>
      </div>
      
      <div id="email-status-msg" style="margin-top: 16px; font-weight: 600; text-align: center;"></div>
    </div>
  </div>
</section>
