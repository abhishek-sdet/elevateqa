<section id="sec-email" style="display:none; padding-bottom: 120px;" aria-labelledby="sec-email-heading">
  <div class="manager-card primary-card fade-in">
    <div class="card-header" style="display: block; margin-bottom: 24px;">
      <div class="section-title" id="sec-email-heading">Blast Out <em>Event Updates</em></div>
      <p style="color: var(--text-dim); font-size: 14px; margin-top: 8px; line-height: 1.5;">Send emails directly from <strong style="color: var(--accent);">elevateqa@sdettech.com</strong> to registered attendees or custom lists.</p>
    </div>
    
    <div class="card-body">
      <div class="form-group" style="margin-bottom: 24px;">
        <label for="email-subject">Email Subject <span class="label-hint">Appears in the recipient's inbox</span></label>
        <input type="text" id="email-subject" placeholder="e.g. Elevate QA 2026: Important Update">
      </div>

      <div class="form-group" style="margin-bottom: 24px;">
        <label for="email-message">Message <span class="label-hint">(HTML supported)</span></label>
        <textarea id="email-message" rows="8" placeholder="Type your email content here. You can use simple HTML tags like <b>, <i>, <br>, <p>, and <a>."></textarea>
      </div>

      <div class="form-group" style="margin-bottom: 24px; border-top: 1px dashed var(--line-light); padding-top: 24px;">
        <label>Recipient Target <span class="label-hint">Who will receive this email</span></label>
        <div style="display: flex; gap: 24px; align-items: center; margin-top: 12px;">
          <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-main); font-weight: 500;">
            <input type="radio" name="email-target" value="all" checked onchange="toggleCustomEmailInput()" style="accent-color: var(--accent); transform: scale(1.2);"> All Registered Attendees
          </label>
          <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-main); font-weight: 500;">
            <input type="radio" name="email-target" value="custom" onchange="toggleCustomEmailInput()" style="accent-color: var(--accent); transform: scale(1.2);"> Custom Email(s)
          </label>
        </div>
      </div>

      <div id="custom-emails-container" class="form-group" style="display: none; margin-bottom: 24px;">
        <label for="custom-emails-input">Custom Emails <span class="label-hint">(Comma separated)</span></label>
        <textarea id="custom-emails-input" rows="3" placeholder="john@example.com, sarah@sdettech.com"></textarea>
      </div>

      <div class="action-row" style="margin-top: 32px; text-align: left;">
        <button id="btn-send-email" class="btn-primary" onclick="sendCustomEmail()" style="font-size: 14px; padding: 12px 24px;">
          SEND EMAIL BLAST <span aria-hidden="true" style="margin-left: 8px;">🚀</span>
        </button>
      </div>
      
      <div id="email-status-msg" style="margin-top: 16px; font-weight: 600;"></div>
    </div>
  </div>
</section>
