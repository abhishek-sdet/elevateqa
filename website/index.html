<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevate QA 2026 — AI-Led Quality Engineering: The Proof of Value</title>
  <meta name="description" content="Elevate QA 2026 — The AI-Led Quality Engineering Tech Summit. A one-day symposium for QE leaders. Delhi NCR, India, August 2026.">

  <!-- SECURITY HEADERS -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; script-src 'self' 'unsafe-inline' file: blob: https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://*.supabase.co; style-src 'self' 'unsafe-inline' file: https://fonts.googleapis.com; font-src 'self' file: https://fonts.gstatic.com; img-src 'self' data: file: blob: https: https://images.unsplash.com; connect-src 'self' file: https://cdn.jsdelivr.net https://*.supabase.co wss://*.supabase.co http://localhost:3000 https://elevateqa.sdettech.com https://*.sdettech.com https://elevateqa.netlify.app https://*.netlify.app; worker-src 'self' file: blob:; base-uri 'self'; form-action 'self';">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">

  <!-- SEO / SOCIAL -->
  <meta name="theme-color" content="#0b0b10">
  <link rel="canonical" href="https://elevateqa.sdettech.com/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Elevate QA 2026 — AI-Led Quality Engineering: The Proof of Value">
  <meta property="og:description" content="A one-day symposium for QE leaders. Delhi NCR, India, August 2026.">
  <meta property="og:image" content="https://elevateqa.sdettech.com/og-image.png">
  <meta property="og:url" content="https://elevateqa.sdettech.com/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Elevate QA 2026 — AI-Led Quality Engineering">
  <meta name="twitter:description" content="A one-day symposium for QE leaders. Delhi NCR, India, August 2026.">
  <meta name="twitter:image" content="https://elevateqa.sdettech.com/og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400..800&family=JetBrains+Mono:wght@300;400;500;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style/elevate-main.css">
  <link rel="stylesheet" href="src/style/sections/footer.css">

  <!-- CRITICAL: Brand Color — applied immediately, hardcoded to ensure it always renders -->
  <style>
    :root { --accent: #d4ff3a; }
    /* Force the accent color on all emphasized and accent-labeled elements */
    :not(.prizes-strip) em,
    :not(.prizes-strip) .accent,
    :not(.prizes-strip) span.accent,
    .accent,
    span.accent { 
      color: var(--accent) !important; 
    }
    /* Hard-lock Black Background for Maturity Map */
    .infographic-section { background: #000000 !important; color: #ffffff !important; }
    .infographic-section .section-title { color: #ffffff !important; }
    .infographic-section .section-title em { color: var(--accent) !important; }
  </style>

  <!-- CRITICAL: Logo preload from localStorage to prevent flash & guarantee visibility -->
  <script>
    (function() {
      try {
        const visuals = JSON.parse(localStorage.getItem('elevate_visuals') || '{}');
        const logoUrl = visuals.logo || './logo.png';
        
        // Immediate DOM observer to set the src as soon as elements appear
        const observer = new MutationObserver((mutations) => {
          const preloaderImg = document.getElementById('preloader-logo-img');
          const siteLogoImg = document.getElementById('site-logo-img');
          if (preloaderImg) {
            preloaderImg.src = logoUrl;
            preloaderImg.onerror = function() { this.src = './logo.png'; };
          }
          if (siteLogoImg) {
            siteLogoImg.src = logoUrl;
            siteLogoImg.onerror = function() { this.src = './logo.png'; };
          }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <div class="ambient-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <!-- CINEMATIC LOGO PRELOADER -->
  <div id="page-preloader">
    <div class="preloader-content">
      <!-- Embedded preloader logo for 0ms instant display -->
      <img id="preloader-logo-img" class="preloader-logo" style="display: block; margin: 0 auto 30px;" src="./logo.png" alt="Elevate QA Logo">
      <!-- Circular Tech Spinner -->
      <div class="tech-spinner-wrap">
        <div class="spinner-ring ring-outer"></div>
        <div class="spinner-ring ring-inner"></div>
        <div class="spinner-core"></div>
      </div>
    </div>
  </div>

  <script>
    // Failsafe: If loaded locally (file:// protocol) where ES modules are blocked by browser CORS security,
    // or if the main JS bundle fails to initialize, automatically dismiss the preloader after 1.5 seconds.
    setTimeout(function() {
      var preloader = document.getElementById('page-preloader');
      if (preloader && !preloader.classList.contains('fade-out')) {
        preloader.classList.add('fade-out');
        setTimeout(function() { preloader.remove(); }, 800);
        console.warn('ElevateQA: Preloader dismissed by local file protocol failsafe.');
      }
    }, 1500);
  </script>

  <div id="scroll-progress"></div>
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <a href="#main" class="skip-link">Skip to content</a>

  {{> ticker }}
  {{> header }}

  <main id="main">
    {{> hero }}
    {{> proof-bar }}
    {{> manifesto }}
    {{> map }}
    {{> experience }}
    {{> agenda }}
    {{> speakers }}
    {{> prizes }}
    {{> coming }}
    {{> involve }}
  </main>
  <!-- Floating CTA Button -->
  <button class="floating-cta" onclick="openChooser(event)" aria-label="Speak or Attend Elevate QA">
    <span class="icon">🎟</span> <span class="text">Join the Event</span>
  </button>

  {{> modal }}
  {{> footer }}

  <!-- App Scripts -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- EmailJS removed — using custom Node.js backend for all email sending -->
  <script type="module" src="src/scripts/main.js"></script>
</body>
</html>
