  <!-- MODALS -->
  <div id="qr-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:11000; align-items:center; justify-content:center; backdrop-filter:blur(20px);">
    <div class="manager-card" style="max-width:400px; text-align:center;">
      <div class="section-title" style="justify-content:center;">Attendee <em>Ticket</em></div>
      <div id="qr-target" style="background:white; padding:20px; border-radius:24px; display:inline-block; margin-bottom:24px;"></div>
      <p id="qr-attendee-name" style="font-family:var(--display); font-size:24px; margin-bottom:8px;"></p>
      <p id="qr-attendee-email" style="font-family:var(--mono); font-size:12px; color:var(--ink-dim); margin-bottom:32px;"></p>
      <button onclick="document.getElementById('qr-modal').style.display='none'" class="btn-mini" style="width:100%;">CLOSE</button>
    </div>
  </div>

  <div id="confirm-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:12000; align-items:center; justify-content:center; backdrop-filter:blur(15px);">
    <div class="manager-card" style="max-width:440px; text-align:center; border-color:var(--line-strong);">
      <div id="confirm-icon" style="font-size:48px; margin-bottom:24px;">⚠️</div>
      <h2 id="confirm-title" style="font-family:var(--display); font-size:28px; margin-bottom:12px;">Are you sure?</h2>
      <p id="confirm-msg" style="color:var(--ink-dim); font-size:15px; margin-bottom:40px; line-height:1.6;"></p>
      <div style="display:flex; gap:16px;">
        <button id="confirm-cancel" class="btn-reset" style="flex:1;">CANCEL</button>
        <button id="confirm-ok" class="btn-save-all" style="flex:1; background:var(--accent-red); color:white;">PROCEED</button>
      </div>
    </div>
  </div>
