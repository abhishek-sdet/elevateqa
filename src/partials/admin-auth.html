  <!-- AUTH OVERLAY -->
  <div id="login-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-step-1-title">
    <div class="login-card">
      <div class="logo" style="display: flex; justify-content: center;">
        <img id="login-logo-img" src="" alt="Elevate Admin" style="height: 48px; width: auto; display: none;">
      </div>
      <div id="auth-step-1">
        <h2 id="auth-step-1-title">Welcome back, <em>Admin</em></h2>
        <p>Enter your administrative email to receive a secure access code.</p>
        <form class="login-form" onsubmit="sendOTP(event)" novalidate>
          <label for="login-number" class="sr-only">Administrative email</label>
          <input type="email" id="login-number" placeholder="admin@example.com" autocomplete="email" required aria-describedby="login-email-msg" aria-invalid="false">
          <!-- Honeypot -->
          <div aria-hidden="true" style="position:absolute;left:-10000px;width:1px;height:1px;overflow:hidden;">
            <label for="login-website">Website</label>
            <input type="text" id="login-website" name="website" tabindex="-1" autocomplete="off">
          </div>
          <div id="login-email-msg" class="auth-msg" role="status" aria-live="polite"></div>
          <button type="submit" class="btn-login" id="btn-send-otp">Send Access Code</button>
        </form>
      </div>
      <div id="auth-step-2" style="display:none;">
        <h2>Verify <em>Identity</em></h2>
        <p>We've sent a 6-digit secure code to <strong id="otp-target-email">...</strong>. It expires in 10 minutes.</p>
        <div class="otp-wrap" role="group" aria-label="One-time access code">
          <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" class="otp-input" oninput="moveFocus(this)" onkeydown="handleBackspace(this, event)" aria-label="Digit 1" aria-describedby="otp-error-msg" aria-invalid="false">
          <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" class="otp-input" oninput="moveFocus(this)" onkeydown="handleBackspace(this, event)" aria-label="Digit 2">
          <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" class="otp-input" oninput="moveFocus(this)" onkeydown="handleBackspace(this, event)" aria-label="Digit 3">
          <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" class="otp-input" oninput="moveFocus(this)" onkeydown="handleBackspace(this, event)" aria-label="Digit 4">
          <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" class="otp-input" oninput="moveFocus(this)" onkeydown="handleBackspace(this, event)" aria-label="Digit 5">
          <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" class="otp-input" oninput="moveFocus(this)" onkeydown="handleBackspace(this, event)" aria-label="Digit 6">
        </div>
        <div id="otp-error-msg" class="auth-msg" role="alert" aria-live="assertive"></div>
        <div id="otp-lockout-msg" class="auth-msg" role="status" aria-live="polite" style="display:none;"></div>
        <button onclick="verifyOTP()" class="btn-login" id="btn-verify-otp">Verify &amp; Enter</button>
      </div>
    </div>
  </div>
